apiVersion: apps/v1
kind: Deployment
metadata:
  name: bugbarn-reader
spec:
  replicas: 2
  revisionHistoryLimit: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: bugbarn
      app.kubernetes.io/component: reader
      app.kubernetes.io/environment: staging
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bugbarn
        app.kubernetes.io/component: reader
        app.kubernetes.io/environment: staging
    spec:
      nodeSelector:
        kubernetes.io/hostname: k3s1
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: bugbarn
          image: bugbarn/service
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: BUGBARN_MODE
              value: reader
            - name: BUGBARN_WRITER_URL
              value: http://bugbarn-writer:8080
            - name: BUGBARN_REDIS_QUEUE_URL
              value: redis://bugbarn-redis-queue:6379/0
            - name: BUGBARN_ADDR
              value: :8080
            - name: BUGBARN_PUBLIC_URL
              value: https://bugbarn.staging.wiebe.xyz
            - name: BUGBARN_ENV
              value: staging
            - name: BUGBARN_DB_PATH
              value: /var/lib/bugbarn/bugbarn.db
            - name: BUGBARN_SESSION_TTL_SECONDS
              value: "86400"
            - name: BUGBARN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: bugbarn-secrets
                  key: BUGBARN_API_KEY
            - name: BUGBARN_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: bugbarn-secrets
                  key: BUGBARN_ADMIN_USERNAME
                  optional: true
            - name: BUGBARN_ADMIN_PASSWORD_BCRYPT
              valueFrom:
                secretKeyRef:
                  name: bugbarn-secrets
                  key: BUGBARN_ADMIN_PASSWORD_BCRYPT
                  optional: true
            - name: BUGBARN_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: bugbarn-secrets
                  key: BUGBARN_SESSION_SECRET
                  optional: true
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: bugbarn-secrets
                  key: OTEL_EXPORTER_OTLP_ENDPOINT
                  optional: true
            - name: OTEL_EXPORTER_OTLP_HEADERS
              valueFrom:
                secretKeyRef:
                  name: bugbarn-secrets
                  key: OTEL_EXPORTER_OTLP_HEADERS
                  optional: true
            - name: BUGBARN_FUNNELBARN_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: bugbarn-secrets
                  key: BUGBARN_FUNNELBARN_ENDPOINT
                  optional: true
            - name: BUGBARN_FUNNELBARN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: bugbarn-secrets
                  key: BUGBARN_FUNNELBARN_API_KEY
                  optional: true
            - name: BUGBARN_OIDC_ISSUER
              valueFrom:
                secretKeyRef:
                  name: bugbarn-secrets
                  key: BUGBARN_OIDC_ISSUER
                  optional: true
            - name: BUGBARN_OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: bugbarn-secrets
                  key: BUGBARN_OIDC_CLIENT_ID
                  optional: true
            - name: BUGBARN_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: bugbarn-secrets
                  key: BUGBARN_OIDC_CLIENT_SECRET
                  optional: true
            - name: BUGBARN_OIDC_REDIRECT_URL
              valueFrom:
                secretKeyRef:
                  name: bugbarn-secrets
                  key: BUGBARN_OIDC_REDIRECT_URL
                  optional: true
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: bugbarn-data
              mountPath: /var/lib/bugbarn
              readOnly: true
      volumes:
        - name: bugbarn-data
          persistentVolumeClaim:
            claimName: bugbarn-data
            readOnly: true
