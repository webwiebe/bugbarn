apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: bugbarn-staging
resources:
  - namespace.yaml
  - pvc.yaml
  - writer-deployment.yaml
  - writer-service.yaml
  - reader-deployment.yaml
  - reader-service.yaml
  - web-deployment.yaml
  - web-service.yaml
  - ingress.yaml
images:
  - name: bugbarn/service
    newName: ghcr.io/webwiebe/bugbarn/service
    newTag: local
  - name: bugbarn/web
    newName: ghcr.io/webwiebe/bugbarn/web
    newTag: local
