apiVersion: apps/v1
kind: Deployment
metadata:
  name: bugbarn
spec:
  replicas: 1
  revisionHistoryLimit: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: bugbarn
      app.kubernetes.io/environment: staging
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bugbarn
        app.kubernetes.io/environment: staging
    spec:
      nodeSelector:
        kubernetes.io/hostname: k3s1
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: bugbarn
          image: bugbarn/service
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: BUGBARN_ADDR
              value: :8080
            - name: BUGBARN_SPOOL_DIR
              value: /var/lib/bugbarn/spool
            - name: BUGBARN_DB_PATH
              value: /var/lib/bugbarn/bugbarn.db
            - name: BUGBARN_MAX_SPOOL_BYTES
              value: "104857600"
            - name: BUGBARN_SESSION_TTL_SECONDS
              value: "86400"
            - name: LITESTREAM_REPLICA_PATH
              value: staging/bugbarn.db
            - name: BUGBARN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: bugbarn-secrets
                  key: BUGBARN_API_KEY
            - name: BUGBARN_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: bugbarn-secrets
                  key: BUGBARN_ADMIN_USERNAME
                  optional: true
            - name: BUGBARN_ADMIN_PASSWORD_BCRYPT
              valueFrom:
                secretKeyRef:
                  name: bugbarn-secrets
                  key: BUGBARN_ADMIN_PASSWORD_BCRYPT
                  optional: true
            - name: BUGBARN_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: bugbarn-secrets
                  key: BUGBARN_SESSION_SECRET
                  optional: true
            - name: LITESTREAM_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: bugbarn-secrets
                  key: LITESTREAM_ACCESS_KEY_ID
            - name: LITESTREAM_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: bugbarn-secrets
                  key: LITESTREAM_SECRET_ACCESS_KEY
            - name: SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: smtp-secret
                  key: SMTP_HOST
                  optional: true
            - name: SMTP_PORT
              valueFrom:
                secretKeyRef:
                  name: smtp-secret
                  key: SMTP_PORT
                  optional: true
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: smtp-secret
                  key: SMTP_USER
                  optional: true
            - name: SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: smtp-secret
                  key: SMTP_PASS
                  optional: true
            - name: SMTP_FROM
              valueFrom:
                secretKeyRef:
                  name: smtp-secret
                  key: SMTP_FROM
                  optional: true
            - name: BUGBARN_DIGEST_ENABLED
              valueFrom:
                secretKeyRef:
                  name: smtp-secret
                  key: BUGBARN_DIGEST_ENABLED
                  optional: true
            - name: BUGBARN_DIGEST_TO
              valueFrom:
                secretKeyRef:
                  name: smtp-secret
                  key: BUGBARN_DIGEST_TO
                  optional: true
            - name: BUGBARN_DIGEST_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: smtp-secret
                  key: BUGBARN_DIGEST_WEBHOOK_URL
                  optional: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: bugbarn-data
              mountPath: /var/lib/bugbarn
      volumes:
        - name: bugbarn-data
          persistentVolumeClaim:
            claimName: bugbarn-data
