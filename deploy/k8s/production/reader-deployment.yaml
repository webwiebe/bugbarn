apiVersion: apps/v1
kind: Deployment
metadata:
  name: bugbarn-reader
spec:
  replicas: 2
  revisionHistoryLimit: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: bugbarn
      app.kubernetes.io/component: reader
      app.kubernetes.io/environment: production
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bugbarn
        app.kubernetes.io/component: reader
        app.kubernetes.io/environment: production
    spec:
      nodeSelector:
        kubernetes.io/hostname: layer7-prod
      imagePullSecrets:
        - name: ghcr-secret
      # Give the pod time to drain its ingest spool to the writer on SIGTERM
      # before kubelet hard-kills it. Must exceed DrainOnce's 45s deadline.
      terminationGracePeriodSeconds: 75
      containers:
        - name: bugbarn
          image: bugbarn/service
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: BUGBARN_MODE
              value: reader
            - name: BUGBARN_WRITER_URL
              value: http://bugbarn-writer:8080
            - name: BUGBARN_REDIS_QUEUE_URL
              value: redis://bugbarn-redis-queue:6379/0
            - name: BUGBARN_ADDR
              value: :8080
            - name: BUGBARN_PUBLIC_URL
              value: https://bugbarn.wiebe.xyz
            - name: BUGBARN_ENV
              value: production
            - name: BUGBARN_ENVIRONMENT
              value: production
            - name: BUGBARN_DB_PATH
              value: /var/lib/bugbarn/bugbarn.db
            - name: BUGBARN_SPOOL_DIR
              value: /var/spool/bugbarn
            - name: BUGBARN_SESSION_TTL_SECONDS
              value: "43200"
            - name: BUGBARN_OIDC_REFRESH_GRACE_SECONDS
              value: "3600"
            - name: BUGBARN_SELF_ENDPOINT
              value: https://bugbarn.wiebe.xyz
            - name: BUGBARN_SELF_API_KEY
              valueFrom:
                secretKeyRef:
                  name: bugbarn-secrets
                  key: BUGBARN_SELF_API_KEY
            - name: BUGBARN_SELF_PROJECT
              valueFrom:
                secretKeyRef:
                  name: bugbarn-secrets
                  key: BUGBARN_SELF_PROJECT
            - name: BUGBARN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: bugbarn-secrets
                  key: BUGBARN_API_KEY
            - name: BUGBARN_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: bugbarn-secrets
                  key: BUGBARN_ADMIN_USERNAME
                  optional: true
            - name: BUGBARN_ADMIN_PASSWORD_BCRYPT
              valueFrom:
                secretKeyRef:
                  name: bugbarn-secrets
                  key: BUGBARN_ADMIN_PASSWORD_BCRYPT
                  optional: true
            - name: BUGBARN_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: bugbarn-secrets
                  key: BUGBARN_SESSION_SECRET
                  optional: true
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: bugbarn-secrets
                  key: OTEL_EXPORTER_OTLP_ENDPOINT
                  optional: true
            - name: OTEL_EXPORTER_OTLP_HEADERS
              valueFrom:
                secretKeyRef:
                  name: bugbarn-secrets
                  key: OTEL_EXPORTER_OTLP_HEADERS
                  optional: true
            - name: BUGBARN_FUNNELBARN_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: bugbarn-secrets
                  key: BUGBARN_FUNNELBARN_ENDPOINT
                  optional: true
            - name: BUGBARN_FUNNELBARN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: bugbarn-secrets
                  key: BUGBARN_FUNNELBARN_API_KEY
                  optional: true
            - name: BUGBARN_OIDC_ISSUER
              valueFrom:
                secretKeyRef:
                  name: bugbarn-secrets
                  key: BUGBARN_OIDC_ISSUER
                  optional: true
            - name: BUGBARN_OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: bugbarn-secrets
                  key: BUGBARN_OIDC_CLIENT_ID
                  optional: true
            - name: BUGBARN_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: bugbarn-secrets
                  key: BUGBARN_OIDC_CLIENT_SECRET
                  optional: true
            - name: BUGBARN_OIDC_REDIRECT_URL
              valueFrom:
                secretKeyRef:
                  name: bugbarn-secrets
                  key: BUGBARN_OIDC_REDIRECT_URL
                  optional: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          # preStop gives the kube Service time to drop this pod from its
          # endpoints (so no new ingest arrives) before main() sees SIGTERM
          # and starts draining. Without this we could spool requests that
          # arrive during the endpoint propagation window.
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
          volumeMounts:
            - name: bugbarn-data
              mountPath: /var/lib/bugbarn
              readOnly: true
            - name: ingest-spool
              mountPath: /var/spool/bugbarn
      volumes:
        - name: bugbarn-data
          persistentVolumeClaim:
            claimName: bugbarn-data
            readOnly: true
        - name: ingest-spool
          emptyDir:
            sizeLimit: 512Mi
