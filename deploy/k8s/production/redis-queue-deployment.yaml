apiVersion: apps/v1
kind: Deployment
metadata:
  name: bugbarn-redis-queue
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: bugbarn-redis-queue
      app.kubernetes.io/environment: production
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bugbarn-redis-queue
        app.kubernetes.io/environment: production
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          # noeviction: never silently drop queued events/logs under memory
          # pressure. LPUSH fails when full, so the reader's on-disk spool
          # absorbs the overflow instead (spec 007 durability anchor).
          args: ["--maxmemory", "768mb", "--maxmemory-policy", "noeviction"]
          ports:
            - containerPort: 6379
              name: redis
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 900Mi
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 3
            periodSeconds: 10
