<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#171812" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BugBarn" />
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" type="image/svg+xml" href="./icons/icon.svg" />
    <title>BugBarn</title>
    <link rel="stylesheet" href="./styles.css?v=__BUILD_HASH__" />
    <script type="module" src="./dist/app.js?v=__BUILD_HASH__"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </head>
  <body>
    <div class="login-screen" id="login-screen" hidden>
      <div class="login-card">
        <div class="login-brand">BB</div>
        <h1 class="login-title">BugBarn</h1>
        <p class="login-subtitle">Self-hosted error tracking</p>
        <form class="login-form" id="login-form">
          <div class="login-error" id="login-error" hidden></div>
          <label class="field">
            <span>Username</span>
            <input name="username" type="text" autocomplete="username" required />
          </label>
          <label class="field">
            <span>Password</span>
            <input name="password" type="password" autocomplete="current-password" required />
          </label>
          <button class="login-submit" type="submit">Log in</button>
        </form>
      </div>
    </div>
    <div class="app-frame">
      <aside class="sidebar" id="sidebar" aria-label="Primary">
        <div class="side-top">
          <button class="side-mark" id="bb-btn" type="button" aria-label="BugBarn menu" aria-haspopup="true" aria-expanded="false">BB</button>
          <div class="bb-menu" id="bb-menu" hidden role="menu">
            <div class="bb-menu-user" id="bb-menu-user">BugBarn</div>
            <div class="bb-menu-divider"></div>
            <button class="bb-menu-item" id="bb-logout" type="button" role="menuitem">Log out</button>
          </div>
        </div>

        <nav class="side-nav">
          <a class="active" href="#/issues" data-route="issues">
            <span class="nav-icon" aria-hidden="true">⚠</span>
            <span class="nav-label">Issues</span>
          </a>
          <a href="#/releases" data-route="releases">
            <span class="nav-icon" aria-hidden="true">↑</span>
            <span class="nav-label">Releases</span>
          </a>
          <a href="#/alerts" data-route="alerts">
            <span class="nav-icon" aria-hidden="true">◉</span>
            <span class="nav-label">Alerts</span>
          </a>
          <a href="#/logs" data-route="logs">
            <span class="nav-icon" aria-hidden="true">≡</span>
            <span class="nav-label">Logs</span>
          </a>
          <a href="#/settings" data-route="settings">
            <span class="nav-icon" aria-hidden="true">⚙</span>
            <span class="nav-label">Settings</span>
          </a>
        </nav>

        <button class="sidebar-toggle" id="sidebar-toggle" type="button" aria-label="Expand sidebar">›</button>
      </aside>

      <div class="workspace">
        <div id="pending-banner" class="pending-banner" hidden></div>
        <header class="topbar">
          <div class="brand">
            <button class="mobile-menu-btn" id="mobile-menu-btn" type="button" aria-label="Open navigation" aria-expanded="false">☰</button>
            <span class="mobile-brand" aria-hidden="true">BB</span>
            <h1 id="topbar-title">Issues</h1>
            <button class="scope-btn" id="scope-btn" type="button" aria-label="Select project and environment">All projects <span class="scope-chevron">▾</span></button>
          </div>

          <div class="toolbar">
            <div class="project-picker" id="project-picker">
              <button class="project-picker-btn" id="project-picker-btn" type="button" aria-label="Select project">All projects <span class="scope-chevron">▾</span></button>
              <div class="project-picker-dropdown" id="project-picker-dropdown" hidden>
                <input class="project-picker-filter" id="project-picker-filter" type="text" placeholder="Filter…" autocomplete="off" spellcheck="false" />
                <div class="project-picker-list" id="project-picker-list"></div>
              </div>
            </div>
            <select id="env-select" aria-label="Environment" hidden></select>
            <button id="refresh-all" type="button">Refresh</button>
          </div>
        </header>

        <main class="shell">
          <section class="panel panel-main">
            <div id="overview-view" class="view">
              <div class="view-head">
                <h2 id="issue-count">Loading</h2>
                <div class="view-actions">
                  <input id="issue-filter" type="search" placeholder="is unresolved" aria-label="Filter issues" />
                  <span id="route-chip" class="chip">Issues</span>
                </div>
              </div>
              <div id="issue-list" class="list issue-list" aria-live="polite"></div>
            </div>

            <div id="detail-view" class="view hidden">
              <div class="view-head">
                <h2 id="detail-title">Select an issue</h2>
                <div class="chips">
                  <a class="ghost" href="#/">Back to issues</a>
                </div>
              </div>
              <div id="detail-body" class="detail"></div>
            </div>
          </section>

          <aside class="panel panel-live">
            <div class="panel-head">
              <div>
                <h2>Recent events</h2>
              </div>
              <span id="live-status" class="chip">Idle</span>
            </div>
            <div id="live-list" class="list" aria-live="polite"></div>
          </aside>
        </main>

        <footer class="footer">
          <span id="status-text">Waiting for data.</span>
        </footer>
      </div>

      <!-- Scope picker bottom sheet (mobile project+env selector) -->
      <div class="scope-sheet-backdrop" id="scope-backdrop" hidden></div>
      <div class="scope-sheet" id="scope-sheet" hidden>
        <div class="scope-sheet-header">
          <h3>Select scope</h3>
          <button class="scope-sheet-close" id="scope-close" type="button" aria-label="Close">✕</button>
        </div>
        <div class="scope-sheet-body" id="scope-sheet-body"></div>
      </div>

      <!-- Bottom tab bar: inside app-frame so flex layout keeps it pinned -->
      <nav class="mobile-tab-bar" id="mobile-tab-bar" aria-label="Main navigation">
        <a href="#/issues" data-route="issues" class="mobile-tab active">
          <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
            <line x1="12" y1="9" x2="12" y2="13"/>
            <line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
          <span>Issues</span>
        </a>
        <a href="#/releases" data-route="releases" class="mobile-tab">
          <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="16 12 12 8 8 12"/>
            <line x1="12" y1="16" x2="12" y2="8"/>
          </svg>
          <span>Releases</span>
        </a>
        <a href="#/alerts" data-route="alerts" class="mobile-tab">
          <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span>Alerts</span>
        </a>
        <a href="#/logs" data-route="logs" class="mobile-tab">
          <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="8" y1="6" x2="21" y2="6"/>
            <line x1="8" y1="12" x2="21" y2="12"/>
            <line x1="8" y1="18" x2="21" y2="18"/>
            <line x1="3" y1="6" x2="3.01" y2="6"/>
            <line x1="3" y1="12" x2="3.01" y2="12"/>
            <line x1="3" y1="18" x2="3.01" y2="18"/>
          </svg>
          <span>Logs</span>
        </a>
        <a href="#/settings" data-route="settings" class="mobile-tab">
          <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
          <span>Settings</span>
        </a>
      </nav>
    </div>
  </body>
</html>
