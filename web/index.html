<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <title>BugBarn</title>
    <link rel="stylesheet" href="./styles.css" />
    <script defer src="./dist/app.js"></script>
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">BB</div>
        <div>
          <p class="eyebrow">BugBarn</p>
          <h1>Issues, events, and live intake</h1>
        </div>
      </div>

      <div class="toolbar">
        <label class="field">
          <span>API base</span>
          <input id="api-base" type="text" spellcheck="false" placeholder="http://localhost:8080" />
        </label>
        <button id="save-api" type="button">Save</button>
        <button id="refresh-all" type="button">Refresh</button>
      </div>
    </header>

    <main class="shell">
      <aside class="panel panel-list">
        <div class="panel-head">
          <div>
            <p class="eyebrow">Issues</p>
            <h2 id="issue-count">Loading</h2>
          </div>
          <input id="issue-filter" type="search" placeholder="Filter" aria-label="Filter issues" />
        </div>
        <div id="issue-list" class="list" aria-live="polite"></div>
      </aside>

      <section class="panel panel-main">
        <div class="panel-head">
          <div>
            <p class="eyebrow">Detail</p>
            <h2 id="detail-title">Select an issue</h2>
          </div>
          <div class="chips">
            <span id="route-chip" class="chip">Ready</span>
          </div>
        </div>
        <div id="detail-body" class="detail"></div>
      </section>

      <aside class="panel panel-live">
        <div class="panel-head">
          <div>
            <p class="eyebrow">Live</p>
            <h2>Recent events</h2>
          </div>
          <span id="live-status" class="chip">Idle</span>
        </div>
        <div id="live-list" class="list" aria-live="polite"></div>
      </aside>
    </main>

    <footer class="footer">
      <span id="status-text">Waiting for data.</span>
    </footer>
  </body>
</html>
