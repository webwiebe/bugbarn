name: Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "docs/**"
      - ".github/workflows/deploy-site.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: [self-hosted, build]
    steps:
      - name: Reclaim workspaces (clear read-only Go cache from prior runs)
        shell: bash
        run: |
          for c in "$HOME"/github-runners/*/_work/bugbarn/bugbarn/.cache; do
            [ -d "$c" ] || continue
            chmod -R u+w "$c" 2>/dev/null || true
            rm -rf "$c" 2>/dev/null || true
          done
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: site

      - name: Copy docs into content collection
        run: |
          mkdir -p site/src/content/docs
          cp -r docs/. site/src/content/docs/

      - name: Build
        run: npm run build
        working-directory: site

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v5
        with:
          path: site/dist/

  deploy:
    needs: build
    runs-on: [self-hosted, build]
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
