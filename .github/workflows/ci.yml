name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

# Fail fast across re-pushes: a newer commit on the same ref cancels the
# in-flight run instead of letting it finish and queue behind the new one.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  spec:
    runs-on: [self-hosted, build]
    steps:
      - name: Reclaim workspaces (clear read-only Go cache from prior runs)
        shell: bash
        run: |
          for c in "$HOME"/github-runners/*/_work/bugbarn/bugbarn/.cache; do
            [ -d "$c" ] || continue
            chmod -R u+w "$c" 2>/dev/null || true
            rm -rf "$c" 2>/dev/null || true
          done
      - uses: actions/checkout@v6
      - name: Install spec tooling
        shell: bash
        run: |
          set -euo pipefail
          python3 -m venv .ci-venv
          . .ci-venv/bin/activate
          python -m pip install PyYAML
      - name: Spec checks
        shell: bash
        run: |
          set -euo pipefail
          . .ci-venv/bin/activate
          make spec-check

  # Go build/vet/test runs inside BuildKit so the compile cache is shared across
  # both build machines via a registry (GHCR) cache. The `deps` stage pre-compiles
  # the heavy dependency closure (modernc/sqlite -> libc) into a go.sum-keyed
  # layer; mode=max exports it, so whichever runner picks up the job starts warm
  # instead of recompiling SQLite cold (~10 min before). Native arm64 — no QEMU.
  go:
    runs-on: [self-hosted, build]
    permissions:
      contents: read
      packages: write
    env:
      HOME: /Users/wiebe
      PATH: /Users/wiebe/bin:/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
    steps:
      - name: Reclaim workspaces (clear read-only Go cache from prior runs)
        shell: bash
        run: |
          for c in "$HOME"/github-runners/*/_work/bugbarn/bugbarn/.cache; do
            [ -d "$c" ] || continue
            chmod -R u+w "$c" 2>/dev/null || true
            rm -rf "$c" 2>/dev/null || true
          done
      - uses: actions/checkout@v6
      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v4
        with:
          # Persist a named builder across runs so the buildkit container is
          # created once per machine and reused. Avoids the ~1-3 min per-run cost
          # of creating a fresh docker-container builder (image pull + bootstrap),
          # which otherwise dwarfs the ~12s cached build.
          name: bugbarn-ci
          cleanup: false
      - name: GHCR auth
        shell: bash
        run: |
          set -euo pipefail
          DOCKER_CONFIG_DIR="${RUNNER_TEMP}/docker-config-${GITHUB_RUN_ID}"
          mkdir -p "$DOCKER_CONFIG_DIR"
          printf '{"auths":{"ghcr.io":{"auth":"%s"}}}\n' \
            "$(printf '%s:%s' '${{ github.actor }}' '${{ secrets.GITHUB_TOKEN }}' | base64)" \
            > "$DOCKER_CONFIG_DIR/config.json"
          echo "DOCKER_CONFIG=$DOCKER_CONFIG_DIR" >> "$GITHUB_ENV"
      - name: Go build, vet, test (registry-cached via BuildKit)
        shell: bash
        run: |
          set -euo pipefail
          CACHE_REF="ghcr.io/webwiebe/bugbarn/buildcache"
          docker buildx build \
            --platform linux/arm64 \
            --target test \
            -f deploy/docker/service.Dockerfile \
            --cache-from "type=registry,ref=${CACHE_REF}" \
            --cache-to "type=registry,ref=${CACHE_REF},mode=max" \
            --output type=cacheonly \
            .

  # One leg per Node package (dashboard, marketing site, TS SDK) so they install
  # and build in parallel instead of serially.
  node:
    strategy:
      fail-fast: true
      matrix:
        dir:
          - "web"
          - "site"
          - "sdks/typescript"
    runs-on: [self-hosted, build]
    steps:
      - name: Reclaim workspaces (clear read-only Go cache from prior runs)
        shell: bash
        run: |
          for c in "$HOME"/github-runners/*/_work/bugbarn/bugbarn/.cache; do
            [ -d "$c" ] || continue
            chmod -R u+w "$c" 2>/dev/null || true
            rm -rf "$c" 2>/dev/null || true
          done
      - uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Node lint, test, build (${{ matrix.dir }})
        working-directory: ${{ matrix.dir }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
          npm run lint --if-present
          npm run test --if-present
          npm run build --if-present
      - name: Frontend duplication (web only)
        if: ${{ matrix.dir == 'web' }}
        working-directory: web
        shell: bash
        run: npx --yes jscpd@latest .

  python:
    runs-on: [self-hosted, build]
    steps:
      - name: Reclaim workspaces (clear read-only Go cache from prior runs)
        shell: bash
        run: |
          for c in "$HOME"/github-runners/*/_work/bugbarn/bugbarn/.cache; do
            [ -d "$c" ] || continue
            chmod -R u+w "$c" 2>/dev/null || true
            rm -rf "$c" 2>/dev/null || true
          done
      - uses: actions/checkout@v6
      - name: Python checks (sdks/python)
        working-directory: sdks/python
        shell: bash
        run: |
          set -euo pipefail
          python3 -m venv .ci-venv
          . .ci-venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install build pytest ruff
          if [ -f pyproject.toml ]; then
            python -m pip install -e .
          fi
          if find . \( -name 'test_*.py' -o -name '*_test.py' -o -path '*/tests/*.py' \) -print -quit | grep -q .; then
            PYTHONPATH=src python -m pytest
          fi
          if find . -name '*.py' -print -quit | grep -q .; then
            python -m ruff check .
          fi
          if [ -f pyproject.toml ]; then
            python -m build
          fi

  php:
    runs-on: [self-hosted, build]
    steps:
      - name: Reclaim workspaces (clear read-only Go cache from prior runs)
        shell: bash
        run: |
          for c in "$HOME"/github-runners/*/_work/bugbarn/bugbarn/.cache; do
            [ -d "$c" ] || continue
            chmod -R u+w "$c" 2>/dev/null || true
            rm -rf "$c" 2>/dev/null || true
          done
      - uses: actions/checkout@v6
      - name: PHP checks (sdks/php)
        working-directory: sdks/php
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v php >/dev/null 2>&1 || ! command -v composer >/dev/null 2>&1; then
            echo "php/composer not available on runner; skipping PHP checks"
            exit 0
          fi
          composer install --no-interaction --prefer-dist
          if find tests -name '*Test.php' -print -quit 2>/dev/null | grep -q .; then
            ./vendor/bin/phpunit
          fi

  # Code-quality gates. Runs on the runner (not in Docker) so golangci-lint can
  # use full git history for diff-mode and the coverage profile can escape the
  # build. Parallel to the Docker `go` job, which stays the source of truth for
  # build/vet/test pass-fail.
  quality:
    runs-on: [self-hosted, build]
    env:
      HOME: /Users/wiebe
      PATH: /Users/wiebe/bin:/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
    steps:
      # Go writes its module cache read-only; if a prior run left one inside a
      # workspace, the next checkout cannot clean it (EACCES on unlink). Clear
      # any such leftover across this machine's runner instances before checkout.
      # Go caches now live under $HOME (default), so this is a no-op going forward.
      - name: Reclaim workspaces (clear read-only Go cache from prior runs)
        shell: bash
        run: |
          for c in "$HOME"/github-runners/*/_work/bugbarn/bugbarn/.cache; do
            [ -d "$c" ] || continue
            chmod -R u+w "$c" 2>/dev/null || true
            rm -rf "$c" 2>/dev/null || true
          done
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0          # diff-mode lint needs the merge base
      - name: File-length gate (all languages)
        shell: bash
        run: sh scripts/check-file-length.sh
      - name: Ensure golangci-lint (pinned, workspace-local)
        shell: bash
        run: |
          set -euo pipefail
          VERSION="v2.11.4"
          DEST="${GITHUB_WORKSPACE}/.tools"
          mkdir -p "$DEST"
          if [ ! -x "$DEST/golangci-lint" ] || ! "$DEST/golangci-lint" version 2>/dev/null | grep -q "${VERSION#v}"; then
            curl -sSfL "https://raw.githubusercontent.com/golangci/golangci-lint/${VERSION}/install.sh" \
              | sh -s -- -b "$DEST" "$VERSION"
          fi
          "$DEST/golangci-lint" version
      - name: golangci-lint (diff-mode, root + sdks/go)
        shell: bash
        run: |
          set -euo pipefail
          GCL="${GITHUB_WORKSPACE}/.tools/golangci-lint"
          BASE="${{ github.base_ref || 'main' }}"
          git fetch --no-tags origin "$BASE" || true
          "$GCL" run --new-from-rev="origin/$BASE" ./...
          cd sdks/go && "$GCL" run --new-from-rev="origin/$BASE" ./...
      - name: Go coverage ratchet
        shell: bash
        run: sh scripts/check-coverage.sh
      - name: Duplication scan (jscpd)
        shell: bash
        run: npx --yes jscpd@latest .
