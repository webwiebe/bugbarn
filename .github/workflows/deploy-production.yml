name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      production_version:
        description: 'Version to deploy (e.g. v0.1.0) — must already be on staging'
        required: true
        type: string
      confirmed:
        description: 'I confirm this version is validated on staging'
        required: true
        type: boolean
        default: false

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SERVICE_IMAGE: ghcr.io/webwiebe/bugbarn/service
  WEB_IMAGE: ghcr.io/webwiebe/bugbarn/web
  K3S_HOST: layer7.wiebe.xyz
  K3S_USER: deployer
  NAMESPACE: bugbarn-production

jobs:
  preflight:
    runs-on: [self-hosted, build]
    timeout-minutes: 5
    outputs:
      service_digest: ${{ steps.verify.outputs.service_digest }}
      web_digest: ${{ steps.verify.outputs.web_digest }}
    env:
      HOME: /Users/wiebe
      PATH: /Users/wiebe/bin:/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
    steps:
      - name: Require confirmation
        run: |
          if [ "${{ github.event.inputs.confirmed }}" != "true" ]; then
            echo "ERROR: Set 'confirmed' to true to proceed with production deploy"
            exit 1
          fi

      - name: Verify image exists in GHCR and resolve digests
        id: verify
        run: |
          set -euo pipefail
          VERSION="${{ github.event.inputs.production_version }}"
          DOCKER_CONFIG_DIR="${RUNNER_TEMP}/docker-config-${GITHUB_RUN_ID}"
          mkdir -p "$DOCKER_CONFIG_DIR"
          printf '{"auths":{"ghcr.io":{"auth":"%s"}}}\n' \
            "$(printf '%s:%s' '${{ github.actor }}' '${{ secrets.GITHUB_TOKEN }}' | base64)" \
            > "$DOCKER_CONFIG_DIR/config.json"
          export DOCKER_CONFIG="$DOCKER_CONFIG_DIR"
          docker manifest inspect "${SERVICE_IMAGE}:${VERSION}" > /dev/null || \
            { echo "ERROR: ${SERVICE_IMAGE}:${VERSION} not found in GHCR"; exit 1; }
          docker manifest inspect "${WEB_IMAGE}:${VERSION}" > /dev/null || \
            { echo "ERROR: ${WEB_IMAGE}:${VERSION} not found in GHCR"; exit 1; }

          # Resolve immutable digests and deploy by digest: a mutable vX.Y.Z tag
          # is cached per-node under imagePullPolicy: IfNotPresent, so if a tag
          # was ever wrong (see the release retag race) a node would keep serving
          # the stale image even after the tag is corrected.
          SVC_DIGEST="$(docker buildx imagetools inspect "${SERVICE_IMAGE}:${VERSION}" --format '{{.Manifest.Digest}}')"
          WEB_DIGEST="$(docker buildx imagetools inspect "${WEB_IMAGE}:${VERSION}" --format '{{.Manifest.Digest}}')"
          echo "service_digest=${SVC_DIGEST}" >> "$GITHUB_OUTPUT"
          echo "web_digest=${WEB_DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Images verified for ${VERSION}: service@${SVC_DIGEST}, web@${WEB_DIGEST}"

  deploy:
    needs: preflight
    runs-on: [self-hosted, build]
    timeout-minutes: 20
    env:
      HOME: /Users/wiebe
      PATH: /Users/wiebe/bin:/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
    steps:
      - uses: actions/checkout@v6

      - name: Transfer manifests
        run: |
          set -euo pipefail
          ssh -o StrictHostKeyChecking=no "${K3S_USER}@${K3S_HOST}" \
            "rm -rf /tmp/bugbarn-deploy && mkdir -p /tmp/bugbarn-deploy"
          scp -o StrictHostKeyChecking=no -r deploy \
            "${K3S_USER}@${K3S_HOST}:/tmp/bugbarn-deploy/deploy"

      - name: Ensure namespace exists
        run: |
          set -euo pipefail
          ssh -o StrictHostKeyChecking=no "${K3S_USER}@${K3S_HOST}" \
            "kubectl apply -f /tmp/bugbarn-deploy/deploy/k8s/production/namespace.yaml"

      - name: Decrypt and apply secrets
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY_PRODUCTION }}
        run: |
          set -euo pipefail
          sops -d deploy/k8s/production/secret.yaml | \
            ssh -o StrictHostKeyChecking=no "${K3S_USER}@${K3S_HOST}" \
            "kubectl apply -f -"
          sops -d deploy/k8s/production/smtp-secret.yaml | \
            ssh -o StrictHostKeyChecking=no "${K3S_USER}@${K3S_HOST}" \
            "kubectl apply -f -"

      - name: Create GHCR pull secret
        run: |
          set -euo pipefail
          ssh -o StrictHostKeyChecking=no "${K3S_USER}@${K3S_HOST}" "
            kubectl create secret docker-registry ghcr-secret \
              --docker-server=ghcr.io \
              --docker-username='webwiebe' \
              --docker-password='${{ secrets.GHCR_PULL_PAT }}' \
              --namespace=${NAMESPACE} \
              --dry-run=client -o yaml | kubectl apply -f -
          "

      - name: Apply manifests and roll out
        env:
          SERVICE_DIGEST: ${{ needs.preflight.outputs.service_digest }}
          WEB_DIGEST: ${{ needs.preflight.outputs.web_digest }}
        run: |
          set -euo pipefail
          # Deploy by immutable digest so nodes always pull the exact image,
          # regardless of the IfNotPresent tag cache.
          if [ -z "${SERVICE_DIGEST}" ] || [ -z "${WEB_DIGEST}" ]; then
            echo "ERROR: missing image digests from preflight job" >&2
            exit 1
          fi
          # Capture the currently-running images BEFORE mutating so a failed
          # rollout can be reverted to the last-good digest. `kubectl rollout
          # undo` must NOT be used: `apply -k` first sets the kustomize ":local"
          # placeholder (an unpullable tag), creating an intermediate revision
          # that undo would roll back to — which is exactly what broke the writer.
          SVC_OLD=$(ssh -o StrictHostKeyChecking=no "${K3S_USER}@${K3S_HOST}" \
            "kubectl -n ${NAMESPACE} get deployment/bugbarn-writer -o jsonpath='{.spec.template.spec.containers[0].image}'" || true)
          WEB_OLD=$(ssh -o StrictHostKeyChecking=no "${K3S_USER}@${K3S_HOST}" \
            "kubectl -n ${NAMESPACE} get deployment/bugbarn-web -o jsonpath='{.spec.template.spec.containers[0].image}'" || true)
          echo "SVC_OLD=${SVC_OLD}" >> "$GITHUB_ENV"
          echo "WEB_OLD=${WEB_OLD}" >> "$GITHUB_ENV"
          echo "Captured rollback targets: service=${SVC_OLD:-<none>} web=${WEB_OLD:-<none>}"

          ssh -o StrictHostKeyChecking=no "${K3S_USER}@${K3S_HOST}" "
            set -euo pipefail
            kubectl apply -k /tmp/bugbarn-deploy/deploy/k8s/production

            # Delete the old single deployment if it still exists (migration to CQRS split).
            kubectl -n ${NAMESPACE} delete deployment/bugbarn --ignore-not-found=true

            kubectl -n ${NAMESPACE} set image deployment/bugbarn-writer \
              bugbarn=${SERVICE_IMAGE}@${SERVICE_DIGEST}
            kubectl -n ${NAMESPACE} set image deployment/bugbarn-reader \
              bugbarn=${SERVICE_IMAGE}@${SERVICE_DIGEST}
            kubectl -n ${NAMESPACE} set image deployment/bugbarn-web \
              bugbarn-web=${WEB_IMAGE}@${WEB_DIGEST}
            # Writer runs migrations on startup (gated by its startupProbe), so it
            # may take minutes — allow more time than the stateless reader/web.
            kubectl -n ${NAMESPACE} rollout status deployment/bugbarn-writer --timeout=600s
            kubectl -n ${NAMESPACE} rollout status deployment/bugbarn-reader --timeout=180s
            kubectl -n ${NAMESPACE} rollout status deployment/bugbarn-web --timeout=180s
          "

      - name: Rollback on failure
        if: failure()
        run: |
          set -uo pipefail
          # Restore the digests captured before the deploy. Never roll back to a
          # ":local" placeholder (unpullable). If no safe target was captured,
          # leave the deployment as-is for manual inspection rather than break it.
          case "${SVC_OLD:-}" in
            ""|*:local)
              echo "::warning::No safe rollback target captured (SVC_OLD='${SVC_OLD:-}'); leaving deployment for manual inspection."
              exit 0
              ;;
          esac
          ssh -o StrictHostKeyChecking=no "${K3S_USER}@${K3S_HOST}" "
            kubectl -n ${NAMESPACE} set image deployment/bugbarn-writer bugbarn=${SVC_OLD} || true
            kubectl -n ${NAMESPACE} set image deployment/bugbarn-reader bugbarn=${SVC_OLD} || true
            kubectl -n ${NAMESPACE} set image deployment/bugbarn-web bugbarn-web=${WEB_OLD} || true
            echo 'Rolled back to last-good digests'
          " || true

      - name: Post release marker
        if: vars.BUGBARN_ENDPOINT != ''
        env:
          BUGBARN_ENDPOINT: ${{ vars.BUGBARN_ENDPOINT }}
          BUGBARN_API_KEY: ${{ secrets.BUGBARN_API_KEY }}
        run: |
          curl -sf -X POST "${BUGBARN_ENDPOINT}/api/v1/releases" \
            -H "Content-Type: application/json" \
            -H "X-BugBarn-Api-Key: ${BUGBARN_API_KEY}" \
            -H "X-BugBarn-Project: bugbarn-service" \
            -d "{
              \"name\": \"${{ github.event.inputs.production_version }}\",
              \"environment\": \"production\",
              \"version\": \"${{ github.event.inputs.production_version }}\",
              \"commitSha\": \"${GITHUB_SHA}\",
              \"url\": \"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${{ github.event.inputs.production_version }}\",
              \"notes\": \"Deployed by GitHub Actions run #${GITHUB_RUN_NUMBER}\"
            }" || echo "::warning::BugBarn release marker failed"

      - name: Summary
        run: |
          echo "## Production Deploy Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | \`${{ github.event.inputs.production_version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| URL | https://bugbarn.wiebe.xyz |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Namespace | \`${NAMESPACE}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Cluster | \`${K3S_HOST}\` |" >> "$GITHUB_STEP_SUMMARY"
