# golangci-lint v2 configuration.
#
# Posture: in CI we run with --new-from-rev so only issues introduced by a PR
# fail the build (existing debt is tolerated, new debt is blocked). Thresholds
# are tuned to catch genuine offenders without drowning the team; tighten
# funlen to 60/40 once the Phase B refactor pays down the backlog.
version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    # correctness defaults
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unconvert
    - misspell
    - revive
    # the complexity / size / duplication asks
    - gocyclo      # cyclomatic complexity
    - gocognit     # cognitive complexity
    - funlen       # function length
    - lll          # line length
    - dupl         # Go duplication (jscpd owns the other languages)
  settings:
    gocyclo:
      min-complexity: 12
    gocognit:
      min-complexity: 18
    funlen:
      lines: 60
      statements: 40
    lll:
      # 135 still accommodates inline SQL and OTel-style signatures while
      # catching runaway lines.
      line-length: 135
      tab-width: 1
    dupl:
      threshold: 120
    misspell:
      locale: US
    errcheck:
      # Closing a *sql.Rows / rolling back a deferred *sql.Tx are idiomatically
      # unchecked in Go; checking them adds noise without catching real bugs.
      exclude-functions:
        - (*database/sql.Rows).Close
        - (*database/sql.Tx).Rollback
        - (*database/sql.Stmt).Close
    revive:
      rules:
        - name: unreachable-code
        - name: empty-block
  exclusions:
    generated: lax
    rules:
      # Table-driven tests are legitimately long and repetitive, and routinely
      # ignore cleanup (deferred Close) errors.
      - path: _test\.go
        linters:
          - funlen
          - gocyclo
          - gocognit
          - dupl
          - lll
          - errcheck
      # Process bootstrap/orchestration wiring is allowed to be long, with
      # long signatures/log lines and deferred resource Close() at shutdown.
      - path: cmd/bugbarn/
        linters:
          - funlen
          - gocyclo
          - gocognit
          - lll
          - errcheck
